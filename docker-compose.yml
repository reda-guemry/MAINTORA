services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./BACK-END
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
    - ./BACK-END:/var/www/html
    command: >
      sh -lc "until php -r 'try { new PDO(\"pgsql:host=db;port=5432;dbname=maintora\", \"postgres\", \"postgres\"); } catch (Throwable $$e) { exit(1); }'; do sleep 1; done && php artisan migrate::fresh --seed && exec php artisan serve --host=0.0.0.0 --port=8000"
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit((int)!@fsockopen(\"127.0.0.1\", 8000));'"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./BACK-END
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
    command: sh -lc "exec php artisan queue:work"

  scheduler:
    build:
      context: ./BACK-END
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
    command: sh -lc "exec php artisan schedule:work"

  # frontend:
  #   build:
  #     context: ./FRONT-END
  #     dockerfile: Dockerfile
  #     args:
  #       VITE_API_URL: ${VITE_API_URL}
  #       VITE_APP_NAME: ${VITE_APP_NAME}
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     backend:
  #       condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./FRONT-END:/app
    ports:
      - "3000:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    command: sh -lc "npm install && npm run dev -- --host"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data: